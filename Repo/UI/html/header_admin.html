<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<link rel="stylesheet" href="UI/css/header_admin.css" />

<header class="top-header">
  <div class="header-left">
    <button id="sidebarToggle" class="btn btn-light d-flex d-md-none align-items-center justify-content-center p-2"
      type="button" aria-label="Toggle menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 class="mb-0 brand-text">NewsPulse</h1>
    <input type="text" class="form-control form-control-sm border-0 d-none d-md-block search-bar"
      placeholder="Tìm kiếm nội dung...">
  </div>

  <div class="header-right">
    <span class="d-none d-sm-flex header-link-item">Phân tích</span>
    <span class="d-none d-sm-flex header-link-item">Hiệu suất</span>
    <span class="active-tab">Trực tiếp</span>
    <span class="material-symbols-outlined icon-bell">notifications</span>

    <div class="actions-auth" id="user-actions">
      <div id="profile-section" class="profile-container-admin">
        <div class="profile-info-admin" role="button" tabindex="0">
          <div class="profile-details-admin d-none d-md-flex">
            <div class="profile-name-admin" id="profile-name">Đang tải...</div>
            <small class="profile-email-admin">Quản trị viên</small>
          </div>
          <div class="profile-avatar-admin">
            <img src="https://ui-avatars.com/api/?name=Admin&background=002D5E&color=fff" id="user-avatar-img"
              alt="User">
          </div>
          <div class="profile-chevron-admin">
            <span>▼</span>
          </div>
        </div>

        <div class="profile-menu-admin">
          <div class="profile-menu-header-admin">
            <div class="profile-menu-user-admin">
              <div class="profile-menu-avatar-admin">
                <img src="https://ui-avatars.com/api/?name=Admin&background=002D5E&color=fff"
                  id="user-avatar-dropdown-img" alt="User">
              </div>
              <div>
                <div class="profile-menu-name-admin" id="profile-menu-name">Đang tải...</div>
                <small class="profile-menu-email-admin" id="profile-menu-email">admin@newspulse.vn</small>
              </div>
            </div>
          </div>
          <div class="profile-menu-divider-admin"></div>

          <a href="?page=profile" class="profile-menu-item-admin">
            <span class="material-symbols-outlined menu-icon-admin">person</span>
            <div class="menu-content-admin">
              <div class="menu-title-admin">Hồ sơ</div>
              <small>Quản lý thông tin cá nhân</small>
            </div>
          </a>
          <a href="#" class="profile-menu-item-admin">
            <span class="material-symbols-outlined menu-icon-admin">settings</span>
            <div class="menu-content-admin">
              <div class="menu-title-admin">Cài đặt</div>
              <small>Tùy chọn và quyền riêng tư</small>
            </div>
          </a>

          <div class="profile-menu-divider-admin"></div>

          <a href="#" id="logout-btn" class="profile-menu-item-admin logout-item-admin">
            <span class="material-symbols-outlined menu-icon-admin text-danger">logout</span>
            <div class="menu-content-admin">
              <div class="menu-title-admin text-danger">Đăng xuất</div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<script src="UI/js/header_user.js" defer></script>
<script src="UI/js/header_admin.js" defer></script>
