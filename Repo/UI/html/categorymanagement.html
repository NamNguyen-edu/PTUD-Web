<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsPulse - Quản lý Phân loại</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="UI/css/categorymanagement.css">
    <link rel="stylesheet" href="UI/css/sidebar_admin.css">
    <link rel="stylesheet" href="UI/css/header_admin.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    {{SIDEBAR_COMPONENT}}

    <div class="main-wrapper">
        {{HEADER_COMPONENT}}

        <main class="content-area p-4">
            <ul class="nav nav-tabs mb-3" id="managementTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="category-tab-btn" data-bs-toggle="tab"
                        data-bs-target="#category-content" type="button" role="tab">Chuyên mục chính</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tag-tab-btn" data-bs-toggle="tab" data-bs-target="#tag-content"
                        type="button" role="tab">Thẻ từ khóa (Tags)</button>
                </li>
            </ul>

            <div class="d-flex justify-content-end mb-4">
                <button class="btn text-white px-4 fw-bold shadow-sm" data-bs-toggle="modal"
                    data-bs-target="#addItemModal"
                    style="background-color: #002D5E; border-radius: 8px; padding: 10px 20px;">
                    <i class="fas fa-plus me-2"></i>Thêm mới Phân loại
                </button>
            </div>

            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="category-content" role="tabpanel">
                    <div class="table-card bg-white shadow-sm rounded overflow-hidden">
                        <table class="table table-sm align-middle m-0" id="tableCategory" style="font-size: 0.9rem;">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">TÊN CHUYÊN MỤC</th>
                                    <th class="text-center">ĐƯỜNG DẪN (SLUG)</th>
                                    <th class="text-center">SỐ LƯỢNG BÀI</th>
                                    <th class="text-end pe-4">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="category-list-container">
                                {{CATEGORY_ROWS}}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-pane fade" id="tag-content" role="tabpanel">
                    <div class="table-card bg-white shadow-sm rounded overflow-hidden">
                        <table class="table table-sm align-middle m-0" id="tableTag" style="font-size: 0.9rem;">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">TÊN THẺ (TAG)</th>
                                    <th class="text-center">SLUG</th>
                                    <th class="text-center">SỬ DỤNG</th>
                                    <th class="text-end pe-4">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="tag-list-container">
                                {{TAG_ROWS}}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="addItemModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Tạo mới Phân loại</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-3">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">LOẠI</label>
                        <select class="form-select border-0 bg-light" id="modal-type">
                            <option value="Category">Chuyên mục (Category)</option>
                            <option value="Tag">Thẻ (Tag)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">TÊN HIỂN THỊ</label>
                        <input type="text" class="form-control border-0 bg-light" id="modal-name"
                            placeholder="Nhập tên...">
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold text-muted">SLUG TỰ ĐỘNG</label>
                        <input type="text" class="form-control border-0 bg-light text-primary fw-medium" id="modal-slug"
                            readonly placeholder="/slug-tu-dong">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4 fw-bold" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold" id="btn-save-item"
                        style="background-color: #002D5E !important; border: none !important; color: white !important; opacity: 1 !important;">
                        Lưu dữ liệu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editItemModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Chỉnh sửa Phân loại</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-3">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">TÊN HIỂN THỊ MỚI</label>
                        <input type="text" class="form-control border-0 bg-light" id="edit-modal-name"
                            placeholder="Nhập tên mới...">
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold text-muted">SLUG TỰ ĐỘNG CẬP NHẬT</label>
                        <input type="text" class="form-control border-0 bg-light text-primary fw-medium"
                            id="edit-modal-slug" readonly>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4 fw-bold" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold" id="btn-update-item"
                        style="background-color: #002D5E !important; border: none !important; color: white !important; opacity: 1 !important;">
                        Cập nhật dữ liệu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Bạn có chắc muốn xóa mục này không? Hành động này không thể hoàn tác.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger" onclick="executeDelete()">Đồng ý xóa</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="UI/js/categorymanagement.js"></script>
</body>

</html>
