<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - NewsPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Login.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

  <div class="container-fluid p-0">
    <div class="row g-0 vh-100">

      <div class="col-lg-4 d-flex flex-column justify-content-center px-5 bg-white position-relative">
        <div class="logo mb-2 mt-5">NEWSPULSE</div>
        <h4 class="fw-bold mb-4">Create your account</h4>

        <form id="signupForm" novalidate>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên">
          </div>

          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Email or phone</label>
            <input type="text" id="signupUser" class="form-control" placeholder="Nhập email hoặc SĐT">
          </div>

          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="signupPass" class="form-control" placeholder="Tạo mật khẩu">
          </div>

          <div class="mb-3">
            <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
          </div>

          <div class="mb-4 form-check text-start">
            <input type="checkbox" class="form-check-input" id="agreeTerms">
            <label class="form-check-label small" for="agreeTerms">
              I guarantee that the information provided is correct and I agree to the
              <a href="#" class="text-decoration-none color-newspulse fw-bold">Terms & Conditions</a>.
            </label>
          </div>

          <button type="submit" class="btn btn-newspulse w-100 py-2 fw-bold">Sign Up</button>
        </form>

        <p class="mt-4 text-center small">
          Already have an account? <a href="login.html" class="text-decoration-none fw-bold color-newspulse">Log in
            here</a>
        </p>
      </div>

      <div class="col-lg-8 d-none d-lg-flex bg-banner text-center">
        <div class="banner-content">
          <h1 class="display-2 fw-bold mb-2">NEWSPULSE</h1>
          <p class="h4 fw-light tracking-widest">JOIN US - CONNECTING TRUST</p>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/Login.js"></script>
</body>

</html>
