<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Thanh Niên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/Style.css">
</head>

<body>

  <div class="container-fluid p-0">
    <div class="row g-0 vh-100">
      <div class="col-lg-4 d-flex flex-column justify-content-center px-5 bg-white py-5">
        <div class="logo mb-2">THANH NIÊN</div>
        <h4 class="fw-bold mb-4">Register Account</h4>

        <button type="button"
          class="btn btn-outline-secondary w-100 py-2 fw-bold mb-3 d-flex align-items-center justify-content-center btn-google-custom">
          <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="24"
            class="me-2">
          Sign in with Google
        </button>

        <div class="divider-text my-3"><span>Or register with</span></div>

        <form id="registerForm" novalidate>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Email or phone</label>
            <input type="text" id="regEmail" class="form-control">
            <div class="invalid-feedback">Email không hợp lệ.</div>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="regPass" class="form-control">
            <div class="invalid-feedback">Mật khẩu cần 8 ký tự, 1 chữ hoa, 1 số.</div>
          </div>
          <ul class="list-unstyled small text-secondary mb-4 text-start">
            <li>● At least 8 characters long</li>
            <li>● At least one uppercase letter and one number.</li>
          </ul>
          <button type="submit" class="btn btn-thanhnien w-100 py-2 fw-bold text-white">Register</button>
        </form>

        <p class="mt-4 text-center small">
          Already have an account? <a href="login.html" class="text-decoration-none fw-bold color-thanhnien">Log in</a>
        </p>
      </div>

      <div class="col-lg-8 d-none d-lg-flex bg-banner align-items-center justify-content-center text-white text-center">
        <div class="banner-content">
          <h1 class="display-2 fw-bold mb-2">THANH NIÊN</h1>
          <p class="h4 fw-light tracking-widest">KẾT NỐI - CHIA SẺ - LAN TỎA</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/Script.js"></script>
</body>

</html>
