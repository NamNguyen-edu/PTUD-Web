<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết chờ duyệt – Kiểm soát phiên bản</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../css/sidebar_admin.css"/>
    <link rel="stylesheet" href="../css/header_admin.css"/>
    <link rel="stylesheet" href="../css/Version_List.css"/>

    <style>
    :root {
      --sidebar-width: 260px;
    }
    .main-content {
      margin-left: var(--sidebar-width);
      padding-top: 70px;
    }
    body.sidebar-open .main-content {
      margin-left: var(--sidebar-width);
    }
    @media (max-width: 991.98px) {
      .main-content {
        margin-left: 0;
      }
      body.sidebar-open .main-content {
        margin-left: var(--sidebar-width);
      }
    }
    </style>
</head>
<body>

{{SIDEBAR_COMPONENT}}

<!-- ── Main ── -->
<main class="main-content">
  {{HEADER_COMPONENT}}
  <div style="padding: 2rem; max-width: 1200px; margin: 0 auto;">

    <div class="page-header mt-4">
        <div>
            <h1>Bài viết chờ duyệt</h1>
            <p>Nhấp vào từng hàng để thực hiện quy trình duyệt bài</p>
        </div>
        <div class="badge-count">
            <span class="dot"></span>
            {{PENDING_COUNT}} bài đang chờ
        </div>
    </div>

    <div class="table-card">
        <table>
            <colgroup>
                <col class="col-title">
                <col class="col-category">
                <col class="col-author">
                <col class="col-updated">
                <col class="col-versions">
            </colgroup>
            <thead>
                <tr>
                    <th>Tiêu đề</th>
                    <th>Danh mục</th>
                    <th>Tác giả</th>
                    <th>Cập nhật</th>
                    <th style="text-align:right">Phiên bản</th>
                </tr>
            </thead>
            <tbody>
                {{ARTICLES_TABLE}}
            </tbody>
        </table>
    </div>

    <p class="table-footer">
        Chỉ hiển thị bài viết có trạng thái <strong>pending</strong>
    </p>

  </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar_admin.js"></script>

<script>
    function goToVersionControl(articleId) {
        window.location.href = '?page=approval&article_id=' + articleId;
    }
</script>

</body>
</html>
