<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsPulse - Authenticate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="UI/css/login.css">
</head>

<body>
  <div class="container-fluid p-0">
    <div class="row g-0 vh-100">
      <div class="col-lg-4 d-flex flex-column justify-content-center px-5 bg-white position-relative">

        <div class="lang-switch position-absolute top-0 start-0 p-4 small text-secondary">
          <span id="btn-vi" role="button" class="fw-bold" style="cursor: pointer;">Tiếng Việt</span> |
          <span id="btn-en" role="button" class="fw-bold" style="cursor: pointer;">English</span>
        </div>

        <div class="logo mb-2 fw-bold fs-3 text-primary" data-key="logo">NEWSPULSE</div>

        <div id="login-section">
          <h4 class="fw-bold mb-4" data-key="welcome">Welcome back</h4>
          <div id="google-login-btn" class="mb-3"></div>
          <div class="divider text-center my-3 position-relative">
            <hr><span class="bg-white px-2 position-absolute top-50 start-50 translate-middle" data-key="or">Or</span>
          </div>
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label small fw-bold" data-key="email_or_phone">Email</label>
              <input type="text" id="loginUser" name="username" class="form-control" data-placeholder="placeholder_user"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold" data-key="password">Password</label>
              <div class="input-group">
                <input type="password" id="loginPass" name="password" class="form-control"
                  data-placeholder="placeholder_pass" required>
                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="loginPass">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" data-key="log_in">Log in</button>
          </form>
          <p class="mt-4 text-center small">
            <span data-key="no_acc">Don't have an account?</span>
            <a href="javascript:void(0)" class="fw-bold text-decoration-none" onclick="toggleAuth('signup')"
              data-key="sign_up_here">Sign up here</a>
          </p>
        </div>

        <div id="signup-section" style="display: none;">
          <h4 class="fw-bold mb-4" data-key="create_account">Create your account</h4>
          <div id="google-signup-btn" class="mb-3"></div>
          <div class="divider text-center my-3 position-relative">
            <hr><span class="bg-white px-2 position-absolute top-50 start-50 translate-middle" data-key="or">Or</span>
          </div>
          <form id="signupForm" novalidate>
            <div class="mb-3">
              <label class="form-label small fw-bold" data-key="full_name">Full Name</label>
              <input type="text" id="fullName" name="fullname" class="form-control"
                data-placeholder="placeholder_full_name" required>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold" data-key="email_or_phone">Email</label>
              <input type="email" id="signupUser" name="email_or_phone" class="form-control"
                data-placeholder="placeholder_user" required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold" data-key="password">Password</label>
              <div class="input-group">
                <input type="password" id="signupPass" name="password" class="form-control"
                  data-placeholder="placeholder_pass" required>
                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="signupPass">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" data-key="sign_up">Sign Up</button>
          </form>
          <p class="mt-4 text-center small">
            <span data-key="have_acc">Already have an account?</span>
            <a href="javascript:void(0)" class="fw-bold text-decoration-none" onclick="toggleAuth('login')"
              data-key="log_in_here">Log in here</a>
          </p>
        </div>
      </div>

      <div class="col-lg-8 d-none d-lg-flex bg-banner">
        <div class="banner-content text-center px-4">
          <h1 class="fw-bold mb-3 tracking-widest logo fs-1 text-white" data-key="logo">NEWSPULSE</h1>
          <p class="fs-5 border-top border-bottom py-2 d-inline-block text-white fw-medium" data-key="slogan">NHỊP ĐẬP
            TIN TỨC - KẾT NỐI NIỀM TIN</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="UI/js/login.js"></script>
</body>

</html>
