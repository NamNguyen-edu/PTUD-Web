<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - NewsPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/Login.css">

</head>

<body>

  <div class="container-fluid p-0">
    <div class="row g-0 vh-100">
      <div class="col-lg-4 d-flex flex-column justify-content-center px-5 bg-white position-relative">
        <div class="lang-switch position-absolute top-0 start-0 p-4 small text-secondary">
          Tiếng Việt | English
        </div>

        <div class="logo mb-2 fw-bold fs-3 text-primary">NEWSPULSE</div>
        <h4 class="fw-bold mb-4">Welcome back</h4>

        <button type="button"
          class="btn btn-outline-secondary w-100 py-2 fw-bold mb-3 d-flex align-items-center justify-content-center btn-google-custom">
          <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="24"
            class="me-2" alt="Google Logo">
          Sign in with Google
        </button>

        <div class="divider-text my-3 text-center text-muted">
          <hr>
          <span class="bg-white px-2 position-relative" style="top: -25px;">Or</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Email or phone</label>
            <input type="text" id="loginUser" class="form-control" placeholder="Nhập email hoặc SĐT">
            <div class="invalid-feedback">Vui lòng nhập tài khoản.</div>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="loginPass" class="form-control" placeholder="Nhập mật khẩu">
            <div class="invalid-feedback">Mật khẩu phải từ 6 ký tự.</div>
          </div>
          <a href="#" class="d-block mb-4 small text-decoration-none color-newspulse fw-bold">Forgotten password?</a>
          <button type="submit" class="btn btn-newspulse w-100 py-2 fw-bold text-white">Log in</button>
        </form>

        <p class="mt-4 text-center small">
          Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold color-newspulse">Sign up
            here</a>
        </p>
      </div>

      <div class="col-lg-8 d-none d-lg-flex bg-banner align-items-center justify-content-center text-white text-center"
        style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://source.unsplash.com/random/1200x800?news'); background-size: cover;">
        <div class="banner-content">
          <h1 class="display-2 fw-bold mb-2">NEWSPULSE</h1>
          <p class="h4 fw-light tracking-widest">News Pulse – Connecting Trust</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/Login.js"></script>
  <script>
    // Chạy cái này để ép trình duyệt hỏi quyền ngay khi vừa load
    window.onload = function () {
      if (Notification.permission !== 'granted') {
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            new Notification("NewsPulse", { body: "" });
          }
        });
      } else {
        new Notification("NewsPulse", { body: "" });
      }
    };
  </script>
</body>

</html>
