<!DOCTYPE html>

<html lang="vi">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - NewsPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/Login.css">
</head>

<body>
  <div class="container-fluid p-0">
    <div class="row g-0 vh-100">
      <div class="col-lg-4 d-flex flex-column justify-content-center px-5 bg-white position-relative">

        <div class="lang-switch position-absolute top-0 start-0 p-4 small text-secondary">
          <span id="btn-vi" role="button" style="cursor: pointer;" class="fw-bold">Tiếng Việt</span> |
          <span id="btn-en" role="button" style="cursor: pointer;" class="fw-bold">English</span>
        </div>

        <div class="logo mb-2 fw-bold fs-3 text-primary">NEWSPULSE</div>
        <h4 class="fw-bold mb-4" data-key="welcome">Welcome back</h4>

        <button type="button"
          class="btn btn-outline-secondary w-100 py-2 fw-bold mb-3 d-flex align-items-center justify-content-center btn-google-custom">
          <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="24"
            class="me-2" alt="Google Logo">
          <span data-key="sign_in_google">
            Sign in with Google
          </span>

        </button>
        <div class="divider-text my-3 text-center text-muted">
          <hr>
          <span class="bg-white px-2 position-relative" style="top: -25px;">Or</span>
        </div>
        <form id="loginForm" novalidate>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold" data-key="email_or_phone">Email or phone</label>
            <input type="text" id="loginUser" class="form-control" data-placeholder="placeholder_user"
              placeholder="Nhập email hoặc số điện thoại">
            <div class="invalid-feedback" data-key="err_user">Vui lòng nhập tài khoản.</div>
          </div>
          <div class="mb-3 text-start">
            <label class="form-label small fw-bold" data-key="password">Password</label>
            <input type="password" id="loginPass" class="form-control" data-placeholder="placeholder_pass"
              placeholder="Nhập mật khẩu">
            <div class="invalid-feedback" data-key="err_pass">Mật khẩu phải từ 6 ký tự.</div>
          </div>
          <a href="#" class="d-block mb-4 small text-decoration-none color-newspulse fw-bold"
            data-key="forgotten_password">Forgotten password?</a>
          <button type="submit" class="btn btn-newspulse w-100 py-2 fw-bold text-white" data-key="log_in">Log
            in</button>
        </form>
        <p class="mt-4 text-center small">
          <span data-key="no_acc">Don't have an account?</span>
          <a href="signup.html" class="text-decoration-none fw-bold color-newspulse" data-key="sign_up_here">Sign up
            here
          </a>
        </p>
      </div>
      <div class="col-lg-8 d-none d-lg-flex bg-banner align-items-center justify-content-center text-white text-center"
        style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://source.unsplash.com/random/1200x800?news'); background-size: cover;">
        <div class="banner-content">
          <h1 class="display-2 fw-bold mb-2" data-key="logo">NEWSPULSE</h1>
          <p class="h4 fw-light tracking-widest" data-key="slogan">News Pulse – Connecting Trust</p>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/Login.js"></script>
  <script>
    // Chạy cái này để ép trình duyệt hỏi quyền ngay khi vừa load


  </script>

</body>



</html>
