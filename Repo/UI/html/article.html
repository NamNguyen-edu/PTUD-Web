<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <title>NewsPulse Article</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="UI/css/home.css">
  <link rel="stylesheet" href="UI/css/article.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container-fluid">

  <div class="row justify-content-center mt-4">

    <div class="col-lg-8 article-container">

      <div id="article-loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <div id="article-wrapper" class="d-none">

        <div
          id="article-category"
          class="category"
        ></div>

        <h1
          id="article-title"
          class="article-title"
        ></h1>

        <div class="meta">
          <span id="article-author"></span>
          •
          <span id="article-date"></span>
          •
          <span id="article-reading-time"></span>
        </div>

        <div class="article-image overflow-hidden">
          <img
            id="article-thumbnail"
            class="w-100 h-100 object-fit-cover"
          >
        </div>

        <div
          id="article-tags"
          class="tags mt-3"
        ></div>

        <div
          id="article-content"
          class="article-content mt-4"
        ></div>

        <div class="vote-box mt-4">
          <span class="vote up">
            👁 <span id="article-views"></span>
          </span>
        </div>

        <div class="article-actions">

          <button
            id="copy-link-btn"
            class="action-btn"
          >
            🔗 Copy Link
          </button>

          <button
            id="share-btn"
            class="action-btn"
          >
            📤 Share
          </button>

        </div>

        <div class="article-comments mt-5">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0">Bình luận</h3>
            <span id="comment-count" class="text-muted"></span>
          </div>

          <div id="comment-form-container" class="mb-4"></div>

          <div id="comment-error" class="alert alert-danger d-none"></div>

          <div id="comment-list"></div>
        </div>

        <div class="mt-5">

          <h3 class="fw-bold mb-4">
            Related Articles
          </h3>

          <div
            id="related-articles"
            class="row"
          ></div>

        </div>

      </div>

      <div
        id="article-error"
        class="alert alert-danger d-none"
      ></div>

    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="UI/js/header_user.js"></script>
<script src="UI/js/article.js"></script>

</body>
</html>
