<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <title>NewsPulse Article</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="UI/css/home.css">
  <link rel="stylesheet" href="UI/css/article.css">
</head>

<body>

<div id="header-placeholder"></div>

<div class="container-fluid">

  <div class="row justify-content-center mt-4">

    <div class="col-lg-8 article-container">

      <div id="article-loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <div id="article-wrapper" class="d-none">

        <div class="d-flex align-items-center gap-3 mb-2 flex-wrap">
          <div id="article-category" class="category mb-0"></div>
          <div id="article-credibility-badge"></div>
        </div>

        <h1
          id="article-title"
          class="article-title"
        ></h1>

        <div class="meta d-flex justify-content-between align-items-center flex-wrap gap-2 py-2 mb-4">
          <div>
            <span id="article-author" class="fw-semibold text-dark"></span>
            •
            <span id="article-date"></span>
            •
            <span id="article-reading-time"></span>
          </div>
          <div class="text-muted small">
            👁 <span id="article-views" class="fw-semibold">0</span> lượt xem
          </div>
        </div>

        <div class="article-image overflow-hidden">
          <img
            id="article-thumbnail"
            class="w-100 h-100 object-fit-cover"
          >
        </div>

        <div
          id="article-tags"
          class="tags mt-3"
        ></div>

        <div
          id="article-content"
          class="article-content mt-4"
        ></div>

        <div class="vote-interactive-box mt-5 p-4 border rounded-3 bg-light d-flex flex-column align-items-center text-center shadow-sm">
          <h5 class="fw-bold mb-2">Thông tin này có đáng tin cậy không?</h5>
          <p class="text-muted small mb-3" style="max-width: 550px;">Hãy giúp cộng đồng xác minh độ chính xác và tin cậy của bài viết bằng cách bỏ phiếu bình chọn dựa trên nguồn kiến thức của bạn.</p>
          
          <div class="d-flex align-items-center gap-3 w-100 justify-content-center">
            <button id="btn-upvote" class="btn btn-outline-success px-4 py-2 rounded-pill d-flex align-items-center gap-2 transition-all">
              <span class="fs-5">▲</span>
              <span class="fw-semibold">Đáng tin cậy</span>
              <span id="detail-upvotes" class="badge bg-success text-white px-2 py-1 rounded">0</span>
            </button>
            <button id="btn-downvote" class="btn btn-outline-danger px-4 py-2 rounded-pill d-flex align-items-center gap-2 transition-all">
              <span class="fs-5">▼</span>
              <span class="fw-semibold">Nghi vấn/Sai lệch</span>
              <span id="detail-downvotes" class="badge bg-danger text-white px-2 py-1 rounded">0</span>
            </button>
          </div>
        </div>

        <div class="article-comments mt-5">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0">Bình luận</h3>
            <span id="comment-count" class="text-muted"></span>
          </div>

          <div id="comment-form-container" class="mb-4"></div>

          <div id="comment-error" class="alert alert-danger d-none"></div>

          <div id="comment-list"></div>
        </div>

        <div class="mt-5">

          <h3 class="fw-bold mb-4">
            Related Articles
          </h3>

          <div
            id="related-articles"
            class="row"
          ></div>

        </div>

      </div>

      <div
        id="article-error"
        class="alert alert-danger d-none"
      ></div>

    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="UI/js/header_user.js"></script>
<script src="UI/js/article.js"></script>

</body>
</html>
